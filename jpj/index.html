<script>
document.addEventListener("mousemove", function(e) {
    const spark = document.createElement("div");
    spark.classList.add("fire-spark");
    document.body.appendChild(spark);

    spark.style.left = e.pageX + "px";
    spark.style.top = e.pageY + "px";

    // Losowa wielkość
    const size = Math.random() * 10 + 5;
    spark.style.width = size + "px";
    spark.style.height = size + "px";

    // Losowy rozrzut iskier
    const angle = Math.random() * 360;
    const dist = Math.random() * 40;
    spark.style.transform = `translate(${Math.sin(angle)*dist}px, ${Math.cos(angle)*dist}px)`;

    // Usuwanie po animacji
    setTimeout(() => {
        spark.remove();
    }, 700);
});
</script>

<script>
// Ładowanie zapisanego tekstu po wejściu na stronę
window.onload = function() {
    const zapisane = localStorage.getItem("mojTekst");
    if (zapisane) {
        document.getElementById("wynik").innerText = zapisane;
    }
};

function pokaz() {
    const wpisane = document.getElementById("tekst").value;
    document.getElementById("wynik").innerText = wpisane;

    // Zapis do pamięci przeglądarki

}
